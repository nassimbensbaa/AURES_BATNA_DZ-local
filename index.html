<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURES BATNA DZ |   سماعات بلوتوث   </title>

    <!-- Fonts & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * { font-family: 'Cairo', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        @keyframes float { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes shimmer { 0% { background-position: -1000px 0; } 100% { background-position: 1000px 0; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }
        .title-float { animation: float 3s ease-in-out infinite; background: linear-gradient(135deg, #f59e0b, #ef4444, #f59e0b); background-size: 200% 200%; -webkit-background-clip: text; background-clip: text; color: transparent; }
        .btn-glow { transition: all 0.3s ease; position: relative; overflow: hidden; }
        .btn-glow:before { content: ''; position: absolute; top: 50%; left: 50%; width: 0; height: 0; border-radius: 50%; background: rgba(255,255,255,0.3); transform: translate(-50%, -50%); transition: width 0.6s, height 0.6s; }
        .btn-glow:hover:before { width: 300px; height: 300px; }
        .btn-glow:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,0,0,0.3); }
        input { border: 2px solid #e5e7eb; transition: all 0.3s ease; background: white; }
        input:focus { border-color: #f59e0b; box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1); outline: none; transform: scale(1.01); }
        .loading { width: 20px; height: 20px; border: 3px solid #f3f4f6; border-top: 3px solid #f59e0b; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .card-animate { animation: fadeInUp 0.6s ease-out; }
        .discount-badge { position: absolute; top: -10px; right: -10px; background: linear-gradient(135deg, #ef4444, #dc2626); animation: pulse 1.5s ease-in-out infinite; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; animation: fadeInUp 0.3s ease; }
        .modal-content { background: white; border-radius: 30px; max-width: 400px; width: 90%; animation: slideIn 0.3s ease; }
        .timer { background: linear-gradient(135deg, #1f2937, #111827); border-radius: 15px; padding: 12px; margin-top: 15px; }
        .timer-number { background: #374151; border-radius: 10px; padding: 10px; min-width: 60px; text-align: center; }
        .feature-card { transition: all 0.3s ease; }
        .feature-card:hover { transform: translateY(-5px); }
        input.error { border-color: #ef4444; animation: shake 0.5s ease; }
        @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #f59e0b, #ef4444); border-radius: 10px; }
        @keyframes blink { 0%, 100% { opacity: 1; transform: scale(1);} 50% { opacity: 0.8; transform: scale(1.05);} }
        .flash-badge { animation: blink 1s ease-in-out infinite; }
    </style>
</head>
<body>

<div id="root"></div>
<div id="successModal" class="modal">
    <div class="modal-content p-6 text-center">
        <i class="fas fa-check-circle text-green-500 text-6xl mb-4"></i>
        <h3 class="text-2xl font-bold mb-2">تم استلام طلبك!</h3>
        <p class="text-gray-600 mb-4">سنقوم بالتواصل معك خلال 24 ساعة</p>
        <button onclick="closeModal()" class="bg-green-600 text-white px-6 py-2 rounded-full hover:bg-green-700 transition">حسناً</button>
    </div>
</div>

<script>
const PRODUCT = {
    name: "AURES BATNA DZ <br> سماعات بلوتوث",
    price: 1250,
    discount: 20,
    image: "images/nassim1.png.png",
    features: [
        { icon: "fas fa-heartbeat", text: "🔊 صوت نقي وعالي الجودة بتقنية Hi-Fi" },
        { icon: "fas fa-charging-station", text: "🔋 بطارية تدوم لساعات مع علبة شحن قوية" },
        { icon: "fas fa-mobile-alt", text: "🎤 ميكروفون مدمج للمكالمات بوضوح ممتاز" },
        { icon: "fas fa-water", text: "🎵 صوت Bass قوي وتجربة استماع احترافية" }
    ]
};

const finalPrice = PRODUCT.price * (1 - PRODUCT.discount / 100);
const SHIPPING_PRICE = 50;

let formData = {
    firstName: "", lastName: "", phone: "", address: "",
    loading: false, message: "", messageType: ""
};

function startCountdown() {
    let timeLeft = 3600;
    const timerElement = document.getElementById("timer");
    if (!timerElement) return;
    const interval = setInterval(() => {
        if (timeLeft <= 0) { clearInterval(interval); if(timerElement) timerElement.innerHTML = "انتهى العرض!"; return; }
        const hours = Math.floor(timeLeft / 3600);
        const minutes = Math.floor((timeLeft % 3600) / 60);
        const seconds = timeLeft % 60;
        if(timerElement) {
            timerElement.innerHTML = `<div class="flex justify-center gap-3 text-center"><div class="timer-number"><div class="text-2xl font-bold text-white">${String(hours).padStart(2, '0')}</div><div class="text-xs text-gray-400">ساعات</div></div><div class="text-2xl font-bold text-white">:</div><div class="timer-number"><div class="text-2xl font-bold text-white">${String(minutes).padStart(2, '0')}</div><div class="text-xs text-gray-400">دقائق</div></div><div class="text-2xl font-bold text-white">:</div><div class="timer-number"><div class="text-2xl font-bold text-white">${String(seconds).padStart(2, '0')}</div><div class="text-xs text-gray-400">ثواني</div></div></div>`;
        }
        timeLeft--;
    }, 1000);
}

function render() {
    const total = finalPrice + SHIPPING_PRICE;
    const savedAmount = PRODUCT.price - finalPrice;
    const messageClass = formData.messageType === "success" ? "text-green-600" : "text-red-600";

    document.getElementById("root").innerHTML = `
        <div class="max-w-5xl mx-auto p-4 py-8">
            <div class="card-animate">
                <div class="bg-white/10 backdrop-blur-sm rounded-2xl p-3 mb-6 text-center text-white flash-badge">
                    <i class="fas fa-fire text-orange-500"></i>
                    <span class="font-bold">${Math.floor(Math.random() * 50) + 20}</span> شخص يشاهد هذا المنتج الآن
                    <i class="fas fa-eye mr-2"></i>
                </div>
                <div class="grid lg:grid-cols-2 gap-6">
                    <div class="relative">
                        <div class="bg-white rounded-3xl shadow-2xl p-6 relative overflow-hidden group">
                            <div class="discount-badge absolute top-4 right-4 bg-red-500 text-white px-3 py-1 rounded-full text-sm font-bold z-10">-${PRODUCT.discount}% خصم</div>
                            <img src="${PRODUCT.image}" class="w-full rounded-2xl transition-transform duration-500 group-hover:scale-105" onerror="this.onerror=null; this.src='https://via.placeholder.com/500x500?text=Smart+Watch'" alt="ساعة ذكية">
                        </div>
                        <div class="grid grid-cols-2 gap-3 mt-4">
                            ${PRODUCT.features.map(feature => `<div class="bg-white/10 backdrop-blur-sm rounded-xl p-3 text-center text-white feature-card transition"><i class="${feature.icon} text-2xl text-orange-500 mb-1"></i><p class="text-sm">${feature.text}</p></div>`).join('')}
                        </div>
                    </div>
                    <div class="bg-white rounded-3xl shadow-2xl p-6">
                        <div class="text-center mb-4"><i class="fas fa-crown text-yellow-500 text-3xl mb-2"></i><h1 class="text-3xl font-bold title-float">${PRODUCT.name}</h1></div>
                        <div class="text-center mb-4"><span class="text-4xl font-bold text-orange-600">${Math.round(finalPrice)} دج</span><span class="text-gray-400 line-through mr-2">${PRODUCT.price} دج</span><div class="text-sm text-green-600 mt-1"><i class="fas fa-gift"></i> وفرت ${Math.round(savedAmount)} دج</div></div>
                        <div class="timer" id="timer"></div>
                        <div class="space-y-3 mt-4">
                            <input id="firstName" placeholder="الاسم *" value="${escapeHtml(formData.firstName)}" class="w-full p-3 rounded-xl">
                            <input id="lastName" placeholder="اللقب *" value="${escapeHtml(formData.lastName)}" class="w-full p-3 rounded-xl">
                            <input id="phone" placeholder="رقم الهاتف *" value="${escapeHtml(formData.phone)}" class="w-full p-3 rounded-xl" dir="ltr">
                            <input id="address" placeholder="العنوان الكامل (الولاية، البلدية، الشارع) *" value="${escapeHtml(formData.address)}" class="w-full p-3 rounded-xl">
                        </div>
                        <div class="bg-gray-50 rounded-xl p-4 mt-4 space-y-2">
                            <div class="flex justify-between"><span>سعر المنتج:</span><span class="font-bold">${Math.round(finalPrice)} دج</span></div>
                            <div class="flex justify-between"><span>رسوم التوصيل:</span><span class="font-bold">${SHIPPING_PRICE} دج</span></div>
                            <div class="border-t pt-2 flex justify-between text-lg font-bold"><span>المجموع:</span><span class="text-orange-600">${Math.round(total)} دج</span></div>
                        </div>
                        <button id="btn" class="w-full mt-4 bg-gradient-to-r from-orange-500 to-red-500 text-white p-4 rounded-xl btn-glow font-bold text-lg relative overflow-hidden">${formData.loading ? '<span class="loading"></span> جاري الإرسال...' : '🛒 تأكيد الطلب الآن'}</button>
                        <div class="grid grid-cols-2 gap-3 mt-6 text-center text-sm">
                            <div class="bg-orange-50 p-3 rounded-xl transition hover:scale-105"><i class="fas fa-headset text-orange-600 text-2xl mb-1"></i><p class="font-bold text-gray-800">مصلحة الزبائن</p><p class="text-orange-600 font-bold text-md mt-1">0659418701</p><p class="text-xs text-gray-500">متاحة 24/7</p></div>
                            <div class="bg-green-50 p-3 rounded-xl transition hover:scale-105"><i class="fas fa-rocket text-green-600 text-2xl mb-1"></i><p class="font-bold text-gray-800">التوصيل السريع</p><p class="text-xs text-gray-600">في جميع الولايات</p><p class="text-green-600 text-xs font-bold">2-5 أيام كحد أقصى</p></div>
                        </div>
                        <div class="flex justify-around mt-4 pt-2 border-t border-dashed text-xs font-bold"><div class="flash-badge"><i class="fas fa-tags text-red-500 ml-1"></i> عروض حصرية أونلاين</div><div><i class="fas fa-undo-alt text-blue-500 ml-1"></i> استبدال مجاني</div><div><i class="fas fa-lock text-purple-500 ml-1"></i> دفع آمن عند الاستلام</div></div>
                        <p class="text-center mt-3 ${messageClass} text-sm">${formData.message}</p>
                    </div>
                </div>
                <div class="mt-8 bg-gradient-to-l from-indigo-50 to-white rounded-3xl p-5 shadow-lg">
                    <div class="text-center mb-3"><i class="fas fa-store text-indigo-600 text-2xl"></i><h3 class="font-bold text-lg text-gray-800 mr-2">مميزات التسوق من متجر VIP</h3></div>
                    <div class="grid md:grid-cols-4 gap-4"><div class="text-center p-2"><i class="fas fa-shipping-fast text-blue-600 text-3xl mb-2 block"></i><p class="font-bold text-sm">توصيل فوري خلال 48 ساعة</p><p class="text-xs text-gray-500">للطلبات قبل 2 ظهراً</p></div><div class="text-center p-2"><i class="fas fa-wallet text-green-600 text-3xl mb-2 block"></i><p class="font-bold text-sm">الدفع عند الاستلام</p><p class="text-xs text-gray-500">اطلب وادفع بعد الاستلام</p></div><div class="text-center p-2"><i class="fas fa-medal text-yellow-600 text-3xl mb-2 block"></i><p class="font-bold text-sm">ضمان استعادة الحقوق</p><p class="text-xs text-gray-500">14 يوم لاسترجاع المنتج</p></div><div class="text-center p-2 relative flash-badge"><i class="fas fa-gem text-purple-600 text-3xl mb-2 block"></i><p class="font-bold text-sm">تخفيضات VIP</p><p class="text-xs text-gray-500">خصم إضافي على الطلبات الكبيرة</p></div></div>
                </div>
            </div>
        </div>
    `;
    bindEvents();
    startCountdown();
}

function bindEvents() {
    const firstNameInput = document.getElementById("firstName");
    const lastNameInput = document.getElementById("lastName");
    const phoneInput = document.getElementById("phone");
    const addressInput = document.getElementById("address");
    const btn = document.getElementById("btn");
    if(firstNameInput) firstNameInput.oninput = (e) => { formData.firstName = e.target.value; clearMessage(); removeError(e.target); };
    if(lastNameInput) lastNameInput.oninput = (e) => { formData.lastName = e.target.value; clearMessage(); removeError(e.target); };
    if(phoneInput) phoneInput.oninput = (e) => { formData.phone = e.target.value; clearMessage(); removeError(e.target); };
    if(addressInput) addressInput.oninput = (e) => { formData.address = e.target.value; clearMessage(); removeError(e.target); };
    if(btn) btn.onclick = submitOrder;
}

function removeError(element) { if(element) element.classList.remove("error"); }
function showError(element) { if(element) element.classList.add("error"); setTimeout(() => { if(element) element.classList.remove("error"); }, 500); }
function escapeHtml(str) { if (!str) return ""; return str.replace(/[&<>]/g, function(m) { if (m === "&") return "&amp;"; if (m === "<") return "&lt;"; if (m === ">") return "&gt;"; return m; }); }
function clearMessage() { formData.message = ""; formData.messageType = ""; }
function showModal() { const modal = document.getElementById("successModal"); if(modal) modal.style.display = "flex"; }
function closeModal() { const modal = document.getElementById("successModal"); if(modal) modal.style.display = "none"; }

async function submitOrder() {
    if(!formData.firstName){ formData.message = "❌ الرجاء إدخال الاسم"; formData.messageType = "error"; render(); showError(document.getElementById("firstName")); return; }
    if(!formData.lastName){ formData.message = "❌ الرجاء إدخال اللقب"; formData.messageType = "error"; render(); showError(document.getElementById("lastName")); return; }
    if(!formData.phone){ formData.message = "❌ الرجاء إدخال رقم الهاتف"; formData.messageType = "error"; render(); showError(document.getElementById("phone")); return; }
    if(!formData.address){ formData.message = "❌ الرجاء إدخال العنوان"; formData.messageType = "error"; render(); showError(document.getElementById("address")); return; }
    
    const phoneRegex = /^(05|06|07)[0-9]{8}$/;
    if(!phoneRegex.test(formData.phone)){ formData.message = "❌ رقم الهاتف غير صحيح (يجب أن يبدأ بـ 05 أو 06 أو 07)"; formData.messageType = "error"; render(); showError(document.getElementById("phone")); return; }
    
    formData.loading = true;
    formData.message = "";
    render();
    
    const total = finalPrice + SHIPPING_PRICE;
    
    try {
        const res = await fetch("/api/send", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                firstName: formData.firstName,
                lastName: formData.lastName,
                phone: formData.phone,
                address: formData.address,
                shipping: SHIPPING_PRICE,
                total: total,
                productName: PRODUCT.name
            })
        });
        
        let data;
        try { data = await res.json(); } catch(e) { throw new Error("خطأ في استجابة السيرفر"); }
        
        if(data && data.ok === true){
            formData.message = "";
            formData.messageType = "success";
            formData.firstName = "";
            formData.lastName = "";
            formData.phone = "";
            formData.address = "";
            formData.loading = false;
            render();
            showModal();
        } else {
            formData.message = "❌ " + (data?.error || "فشل الإرسال، حاول مرة أخرى");
            formData.messageType = "error";
            formData.loading = false;
            render();
        }
    } catch(err){
        formData.message = "❌ خطأ في الاتصال: " + err.message;
        formData.messageType = "error";
        formData.loading = false;
        render();
    }
}

render();
</script>
</body>
</html>
